<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Old School Barber</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <section class="agendamento">
        <div class="agendamento-container">

            <h2>Agende seu Horário</h2>
            <p>Escolha o barbeiro, serviço, data e horário.</p>

            <!-- MENSAGENS -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash-messages">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('agendamento') }}" method="POST">

                <!-- BARBEIRO -->
                <div class="input-group">
                    <label>Barbeiro</label>
                    <select name="barbeiro" required>
                        <option value="">Selecione</option>
                        {% for barbeiro in barbeiros %}
                        <option value="{{ barbeiro.id }}">
                            {{ barbeiro.nome }} - {{ barbeiro.especialidade }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- SERVIÇO -->
                <div class="input-group">
                    <label>Serviço</label>
                    <select name="servico" required>
                        <option value="">Selecione</option>
                        {% for servico in servicos %}
                        <option value="{{ servico.id }}">
                            {{ servico.nome }} - R$ {{ servico.preco }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- DATA -->
                <div class="input-group">
                    <label>Data</label>
                    <input type="date" name="data" required>
                </div>

                <!-- HORÁRIO -->
                <div class="input-group">
                    <label>Horário</label>
                    <input type="time" name="horario" required>
                </div>

                <button type="submit" class="btn-agendar">
                    Confirmar Agendamento
                </button>

            </form>

            <p class="voltar">
                <a href="{{ url_for('index') }}">Voltar ao início</a>
            </p>

        </div>
    </section>

</body>

</html>
